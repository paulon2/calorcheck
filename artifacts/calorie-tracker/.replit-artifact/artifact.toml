kind = "web"
previewPath = "/"
title = "Controle de Calorias"
version = "1.0.0"
id = "artifacts/calorie-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25174

[services.development]
run = "pnpm --filter @workspace/calorie-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/calorie-tracker", "run", "build" ]
publicDir = "artifacts/calorie-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25174"
BASE_PATH = "/"
